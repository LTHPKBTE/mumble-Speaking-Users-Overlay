name: CI / Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        type: choice
        default: 'Release'
        options:
          - 'Release'
          - 'RelWithDebInfo'

jobs:
  # ==============================================================
  # Windows — MSVC, build plugin.dll
  # ==============================================================
  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -A x64

      - name: Build
        run: cmake --build build --config ${{ inputs.build_type || 'Release' }} --parallel

      - name: Upload plugin.dll
        uses: actions/upload-artifact@v4
        with:
          name: plugin-windows-x64-${{ inputs.build_type || 'Release' }}
          path: |
            build/${{ inputs.build_type || 'Release' }}/plugin.dll
            build/${{ inputs.build_type || 'Release' }}/plugin.pdb
          if-no-files-found: error

      - name: Standalone test (skeleton)
        run: cmake -B build_test -A x64 -DOVERLAY_BUILD_STANDALONE=ON
        continue-on-error: true

  # ==============================================================
  # Release — create GitHub Release with plugin.dll (tag push only)
  # ==============================================================
  release:
    name: Create Release
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/plugin-windows-x64-${{ inputs.build_type || 'Release' }}/plugin.dll
            artifacts/plugin-windows-x64-${{ inputs.build_type || 'Release' }}/plugin.pdb
          body: |
            ## What's New in ${{ github.ref_name }}

            - **Framerate limiter**: Simplified to pure high-resolution waitable timer — removed spin-waiting paths that added complexity with little benefit for overlay use
            - **Hotkey simplification**: Removed the WH_KEYBOARD_LL fallback; the system-level `RegisterHotKey` path has been the only one since v0.1.0 and the hook could contribute to input lag on some configurations
            - **Legacy config upgrade**: VSync is now forced off when upgrading from old-format config files, with an in-app warning popup explaining why
            - **Removed mouse-idle FPS reduction**: This mechanism provided marginal benefit and added unnecessary logic to the framerate system
            - Documentation updates and wording improvements across technical notes

            ## Installation
            1. Download `plugin.dll` from the release assets
            2. Open Mumble **Settings → Plugins → Install Plugin**
            3. Select `plugin.dll` and enable the plugin

            > Currently only Windows is officially supported.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
