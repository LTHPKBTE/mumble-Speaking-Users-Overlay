name: CI / Build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        type: choice
        default: 'Release'
        options:
          - 'Release'
          - 'RelWithDebInfo'

jobs:
  # ==============================================================
  # Windows — MSVC, build plugin.dll
  # ==============================================================
  build-windows:
    name: Windows (MSVC)
    runs-on: windows-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -A x64

      - name: Build
        run: cmake --build build --config ${{ inputs.build_type || 'Release' }} --parallel

      - name: Upload plugin.dll
        uses: actions/upload-artifact@v4
        with:
          name: plugin-windows-x64-${{ inputs.build_type || 'Release' }}
          path: |
            build/${{ inputs.build_type || 'Release' }}/plugin.dll
            build/${{ inputs.build_type || 'Release' }}/plugin.pdb
          if-no-files-found: error

      - name: Standalone test (skeleton)
        run: cmake -B build_test -A x64 -DOVERLAY_BUILD_STANDALONE=ON
        continue-on-error: true

  # ==============================================================
  # Release — create GitHub Release with plugin.dll (tag push only)
  # ==============================================================
  release:
    name: Create Release
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release bundle
        run: |
          BUILD_TYPE="${{ inputs.build_type || 'Release' }}"
          mkdir -p release
          # Copy manifest
          cp manifest.xml release/
          # Copy Windows binary
          cp artifacts/plugin-windows-x64-${BUILD_TYPE}/plugin.dll release/plugin.dll 2>/dev/null || true
          cp artifacts/plugin-windows-x64-${BUILD_TYPE}/plugin.pdb release/plugin.pdb 2>/dev/null || true
          # Create .mumble_plugin zip
          cd release
          zip ../SpeakingUsersOverlay.mumble_plugin manifest.xml plugin.dll 2>/dev/null || true
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            SpeakingUsersOverlay.mumble_plugin
            artifacts/plugin-windows-x64-${{ inputs.build_type || 'Release' }}/plugin.dll
            artifacts/plugin-windows-x64-${{ inputs.build_type || 'Release' }}/plugin.pdb
          body: |
            ## Installation
            1. Download `SpeakingUsersOverlay.mumble_plugin`
            2. Open Mumble's Plugin Manager
            3. Click "Install Plugin" and select the downloaded file

            ## Features
            - Real-time list of talking / whispering / shouting users
            - Adjustable window transparency
            - Always on top + mouse passthrough mode

            > **Note:** Currently only Windows is officially supported. Linux and macOS users may try building from source, but the author does not have testing environments for those platforms.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
